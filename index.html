<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My GitHub Pages Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    footer {
      margin-top: 30px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 GitHub Pages Deployment</h1>

    <p>
      This is a sample <strong>index.html</strong> file for a GitHub repository
      deployed using GitHub Pages.
    </p>

    <a class="btn" href="https://github.com/" target="_blank">
      View GitHub
    </a>

    <footer>
      Hosted with GitHub Pages
    </footer>
  </div>
</body>
</html>
